<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>About Me</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans:opsz@17..18&family=Roboto+Condensed:ital@0;1&display=swap"
            rel="stylesheet">

        <link href="css/style.css" rel="stylesheet">

    </head>

    <body>

        <!--the body element contains all content shown to a visitor-->

        <header>
            <!--the header shows logo and page title-->
            <img src="img/logo-96X96.svg" alt="Blue origami logo">
            <h1>Web Dev I</h1>
        </header>

        <main>
            <!--the main envelops important page content-->

            <section id="hero">
                <!--hero section: shows profile image, name & location-->
                <img src="img/avataaars.png" alt="Avatar picture of me">

                <div>
                    <p>Sean Lyons</p>
                    <p>Bridgewater, NJ</p>
                </div>
                <!--close hero section-->
            </section>

            <section id="bio">

                <!--bio section!: personal info (not too personal)-->

                <h2>Biography:</h2>
                <div>

                    <p>I want to be...</p>

                    <p>Someone who makes the world a better place</p>

                </div>

            </section>

            <section id="hobbies">

                <h2>Hobbies:</h2>

                <ul>
                    <li>Fishing</li>
                    <li>Gardening</li>
                    <li>Spending time with my animals</li>
                </ul>

            </section>

            <section id="gallery">

                <h2>Photo Gallery</h2>

                <hr>

                <figure>
                    <img src="img/mixofveggies-640w.jpg.jpg"
                        alt="A mix of vegetables in a bowl.">

                    <figcaption>A mix of vegetables in a bowl.</figcaption>

                </figure>

                <hr>

                <figure>
                    <img src="img/squash-640w.jpg.jpg" alt="squash growing.">

                    <figcaption>Squash growing.</figcaption>

                </figure>

                <hr>

                <figure>
                    <img src="img/watermelon-640w.jpg.jpg"
                        alt="watermelon growing.">

                    <figcaption>Watermelon growing.</figcaption>

                </figure>

            </section>
        </main>

        <footer>

            © 2026 - Sean Lyons
        </footer>
    </body>

</html>
